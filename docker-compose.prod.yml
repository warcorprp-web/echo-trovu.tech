version: '3.8'

services:
  api:
    image: trovutech/echo:latest
    container_name: echo-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_IP=${SERVER_IP:-}
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - faiss-data:/app/data

  redis:
    image: redis:7-alpine
    container_name: echo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --maxmemory-samples 5

volumes:
  redis-data:
  faiss-data:
